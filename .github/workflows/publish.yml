name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [[ "${TAG_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag ${TAG_NAME} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          github_token: ${{ github.token }}
          args: -vv --latest --strip header --tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  publish:
    needs: [meta, changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Create package tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack
          TARBALL="$(ls -1 *.tgz | head -1)"
          echo "tarball=${TARBALL}" >> "${GITHUB_OUTPUT}"

      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag_name }}
          name: ${{ needs.meta.outputs.release_name }}
          body: ${{ needs.changelog.outputs.release_body }}
          files: ${{ steps.pack.outputs.tarball }}
          prerelease: false
